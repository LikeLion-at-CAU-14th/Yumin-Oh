<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <main class="container">
        <header>
            <img src="asset/logo.png" alt="logo" class="logo">
            <p class="title">회원 가입을 위해 정보를 입력해주세요</p>
        </header>

        <div class="input">

            <div class="info">
                <p class="info-list">* 이메일</p>
                <p class="info-list">* 이름</p>
                <p class="info-list">* 비밀번호</p>
                <p class="info-list">* 비밀번호 확인</p>

            </div>

            <div class="gender">
                <div class="set">
                    <div class="circle"></div>
                    <p>여성</p>
                </div>

                <div class="set">
                    <div class="circle"></div>
                    <p>남성</p>
                </div>
            </div>

            <div class="agreement">
                <div class="square"></div>
                <p>이용약관 개인정보 수집 및 이용, 마케팅 활용 선택에 모두 동의합니다. </p>
            </div>
        </div>

        <footer>
            <p>가입하기</p>
        </footer>

    </main>

    

</body>
</html>
